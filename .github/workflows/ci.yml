name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Each app is a verbatim mirror of its original repo and keeps its OWN lockfile,
# so CI builds each one in isolation from that lockfile - exactly as the per-app
# Dockerfile does for deployment, and as the original per-repo CI did. This
# sidesteps hoisting version-drift between the three apps.
# --workspaces=false is load-bearing: without it, npm ci inside apps/<name>
# detects the workspace root and installs a workspace-scoped subset into the
# ROOT node_modules (which skips peer deps under legacy-peer-deps, e.g.
# @hapi/boom) instead of the app's own full lockfile tree.
jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [back-end, front-end, property-boundaries-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install
        run: npm ci --legacy-peer-deps --workspaces=false
      - name: Build
        run: npm run build --if-present
      - name: Type-check
        run: npm run typecheck --if-present
      - name: Test
        run: npm test --if-present

  # Dockerfile lint + image CVE scan (technology-and-infrastructure#171).
  # DL3018 (pin apk versions) is ignored because pinned alpine packages
  # disappear from the repos and break builds and Alpine should be kept updated
  # Trivy reports fixable HIGH+CRITICAL but only CRITICAL fails the job
  # The FE build needs its required build args - dummy vals fine for scanning
  docker-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [back-end, front-end, property-boundaries-service]
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/${{ matrix.app }}/Dockerfile
          ignore: DL3018
      - name: Build image
        run: >
          docker build apps/${{ matrix.app }} -t ${{ matrix.app }}:scan
          --build-arg NODE_VERSION=24
          --build-arg CADDY_HOSTNAME=ci-scan.invalid
          --build-arg VITE_OS_KEY=ci-scan
          --build-arg VITE_GEOCODER_TOKEN=ci-scan
          --build-arg VITE_MAPBOX_TOKEN=ci-scan
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0
          cache: true
      - name: Trivy report (HIGH+CRITICAL, non-blocking)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ matrix.app }}:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          skip-setup-trivy: true
      - name: Trivy gate (CRITICAL)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ matrix.app }}:scan
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-setup-trivy: true
